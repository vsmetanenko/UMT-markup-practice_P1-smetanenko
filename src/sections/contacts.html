<section id="Contacts" class="contacts-section">
  <div class="container">
    <div class="content">
      <div class="title-section">
        <p class="subtitle">Connect</p>
        <h2 class="title">Get in Touch</h2>
        <p class="text">
          We’re here to assist you with all your floral needs and inquiries.
        </p>
      </div>
      <ul class="contacts-list">
        <li class="contact-item">
          <svg class="icon" width="24" height="24">
            <use href="./images/icons.svg#icon-phone"></use>
          </svg>
          <div class="text">
            <p class="contact-type">Phone</p>
            <a href="tel:+15551234567" class="contact tel" aria-label="Call us at +1 (555) 123-4567">+1 (555) 123-4567</a>
          </div>
        </li>
        <li class="contact-item">
          <svg class="icon" width="24" height="24">
            <use href="./images/icons.svg#icon-map"></use>
          </svg>
          <div class="text">
            <p class="contact-type">Store</p>
            <a
              href="https://maps.google.com/?q=456+Floral+Ave,+Sydney+NSW+2000+AU"
              class="contact"
              target="_blank"
              aria-label="Find us on Google Maps at 456 Floral Ave, Sydney NSW 2000 AU"
              >456 Floral Ave, Sydney NSW 2000 AU</a
            >
          </div>
        </li>
      </ul>
    </div>
    <img
      src="./images/contacts-1x.webp"
      srcset="
        ./images/contacts-1x.webp 1x,
        ./images/contacts-2x.webp 2x
      "
      alt="flowers image"
      class="image"
    />
  </div>
</section>
